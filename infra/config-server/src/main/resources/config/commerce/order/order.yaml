spring:
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5436/order_db}
    driver-class-name: org.postgresql.Driver
    username: ${ORDER_DB_USERNAME:order}
    password: ${ORDER_DB_PASSWORD:order}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
