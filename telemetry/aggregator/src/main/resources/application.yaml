app:
  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.practicum.serializer.AvroSerializer

    consumer:
      group-id: sensor-aggregator-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer:  ru.yandex.practicum.kafka.deserializer.SensorEventDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest

    topics:
      sensors: telemetry.sensors.v1
      snapshot: telemetry.snapshots.v1