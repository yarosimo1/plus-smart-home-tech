app:
  kafka:
    bootstrap-servers: localhost:9092r

    consumer:
      snapshot:
        group-id: snapshot-processor-group
        value-deserializer: ru.practicum.telemetry.deserializer.SensorsSnapshotDeserializer
      hub:
        group-id: hub-events-group
        value-deserializer: ru.practicum.telemetry.deserializer.HubEventDeserializer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest

    topics:
      hub: telemetry.hubs.v1
      snapshot: telemetry.snapshots.v1

grpc:
  client:
    hub-router:
      address: 'static://localhost:59090'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

#Database
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_home
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      date-format: yyyy-MM-dd HH:mm:ss
      deserialization:
        adjust-dates-to-context-time-zone: false
