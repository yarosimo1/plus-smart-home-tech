spring:
  application:
    name: collector
  config:
    fail-fast: true
    retry:
      initial-interval: 2000
      multiplier: 1.5
      max-interval: 1000
      max-attempts: 20

    import: "configserver:"

  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server

eureka:
  client:
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/
