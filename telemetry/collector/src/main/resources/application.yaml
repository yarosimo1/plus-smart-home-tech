spring:
  application:
    name: collector
  config:
    fail-fast: true
    retry:
      useRandomPolicy: true
      max-interval: 10000

    import: "configserver:"

  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server

eureka:
  client:
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/